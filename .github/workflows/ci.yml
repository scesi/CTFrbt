name: CI

on:
  push:
    branches: ["dev", "main"]
  pull_request:
    branches: ["dev", "main"]

permissions:
  contents: read

concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

jobs:
  build-and-test:
    name: Build & Lint
    runs-on: ubuntu-latest
    timeout-minutes: 10

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup pnpm
        uses: pnpm/action-setup@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 24
          cache: "pnpm"

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Check formatting
        run: pnpm run format:check

      - name: Run linter
        run: pnpm run lint

      - name: Build Next.js app
        run: pnpm run build
        env:
          DATABASE_URL: "postgresql://ci:ci@localhost:5432/ci"
          NEXTAUTH_SECRET: "ci-build-only-secret"
          NEXTAUTH_URL: "http://localhost:3000"

  test:
    name: Tests
    runs-on: ubuntu-latest
    timeout-minutes: 10

    services:
      postgres-test:
        image: postgres:18.4-alpine
        env:
          POSTGRES_USER: ctfrbt
          POSTGRES_PASSWORD: ctfrbt
          POSTGRES_DB: ctfrbt_test
        ports:
          - "5434:5432"
        options: >-
          --health-cmd "pg_isready -U ctfrbt -d ctfrbt_test"
          --health-interval 5s
          --health-timeout 5s
          --health-retries 10

    env:
      DATABASE_URL: "postgresql://ctfrbt:ctfrbt@localhost:5434/ctfrbt_test"
      NEXTAUTH_SECRET: "test-secret"
      NEXTAUTH_URL: "http://localhost:3000"

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup pnpm
        uses: pnpm/action-setup@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 24
          cache: "pnpm"

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      # The generated Prisma client is gitignored, so build it before tests.
      - name: Generate Prisma client
        run: pnpm prisma generate

      - name: Run tests
        run: pnpm test
