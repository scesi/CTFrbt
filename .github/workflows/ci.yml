name: CI

on:
  push:
    branches: ["dev", "main"]
  pull_request:
    branches: ["dev", "main"]

# Least privilege — this workflow only reads the repo
permissions:
  contents: read

# Cancel superseded runs for the same branch/PR
concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

jobs:
  build-and-test:
    name: Build & Lint
    runs-on: ubuntu-latest
    timeout-minutes: 10

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      # Version comes from the "packageManager" field in package.json,
      # so CI and local environments can never drift apart
      - name: Setup pnpm
        uses: pnpm/action-setup@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: "pnpm"

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Run linter
        run: pnpm run lint

      - name: Build Next.js app
        run: pnpm run build
        env:
          # Build-time stubs — prisma generate and next build never connect
          # to a database, but module-scope env reads must not break the build
          DATABASE_URL: "postgresql://ci:ci@localhost:5432/ci"
          NEXTAUTH_SECRET: "ci-build-only-secret"
          NEXTAUTH_URL: "http://localhost:3000"
