services:
  postgres:
    image: postgres:18.4-alpine
    container_name: ctfrbt-db
    restart: unless-stopped
    environment:
      POSTGRES_USER: ctfrbt
      POSTGRES_PASSWORD: ctfrbt
      POSTGRES_DB: ctfrbt
    ports:
      - "5433:5432"
    volumes:
      - pgdata:/var/lib/postgresql
    healthcheck:
      test: [ "CMD-SHELL", "pg_isready -U ctfrbt -d ctfrbt" ]
      interval: 5s
      timeout: 5s
      retries: 5

volumes:
  pgdata:
