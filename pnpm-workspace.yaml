allowBuilds:
  "@prisma/client": true
  "@prisma/engines": true
  esbuild: true
  prisma: true
  sharp: true
  unrs-resolver: true

# Security patches for transitive deps (Dependabot alerts).
# Scoped by version range so only vulnerable resolutions are replaced.
overrides:
  "postcss@<8.5.10": ">=8.5.10"
  "uuid@<11.1.1": "^11.1.1"
  "esbuild@>=0.27.3 <0.28.1": ">=0.28.1"
